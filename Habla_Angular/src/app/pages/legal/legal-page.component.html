<main class="legal-page">
  <section class="legal-shell">
    <a
      class="back-link"
      routerLink="/login"
    >
      Volver
    </a>

    <header class="legal-hero">
      <span>{{ page.eyebrow }}</span>
      <h1>{{ page.title }}</h1>
      <p>{{ page.intro }}</p>
      <small>Ultima actualizacion: {{ page.updatedAt }}</small>
    </header>

    <section class="legal-content">
      <article
        *ngFor="let section of page.sections"
        class="legal-section"
      >
        <h2>{{ section.title }}</h2>

        <p *ngFor="let paragraph of section.body">
          {{ paragraph }}
        </p>
      </article>
    </section>

    <footer class="legal-footer">
      <a routerLink="/privacy-policy">Politica de privacidad</a>
      <a routerLink="/terms">Terminos</a>
      <a routerLink="/cookies">Cookies</a>
    </footer>
  </section>
</main>
