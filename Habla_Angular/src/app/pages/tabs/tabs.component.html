<ion-tabs>
  
  <ion-tab-bar slot="bottom">

    <ion-tab-button tab="home" href="/tabs/home">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="appointments" href="/tabs/appointments">
      <ion-icon name="calendar-outline"></ion-icon>
      <ion-label>Citas</ion-label>
    </ion-tab-button>

    <ion-tab-button
  *ngIf="userRole === 'PROFESSIONAL'"
  tab="professional-dashboard"
  href="/tabs/professional-dashboard"
>
  <ion-icon name="briefcase-outline"></ion-icon>
  <ion-label>Panel Pro</ion-label>
</ion-tab-button>

    <ion-tab-button tab="messages" href="/tabs/messages">
      <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
      <ion-label>Mensajes</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile" href="/tabs/profile">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>

  </ion-tab-bar>

</ion-tabs>
