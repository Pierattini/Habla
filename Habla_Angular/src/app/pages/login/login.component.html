<main class="login-page">
  <section class="login-card" aria-label="Login">
    <div class="brand">
      <div class="brand-mark">H</div>
      <p>Habla</p>
    </div>

    <div class="login-heading">
      <h1>Iniciar sesion</h1>
      <p>Accede a tu espacio de atencion y bienestar.</p>
    </div>

    <label class="field">
      <span>Email</span>
      <input
        placeholder="Email"
        [(ngModel)]="email"
      />
    </label>

    <label class="field">
      <span>Password</span>
      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
      />
    </label>

    <button
      class="login-button"
      (click)="login()"
    >
      Iniciar sesion
    </button>
  </section>
</main>
